[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.28"
optimizer = true
optimizer_runs = 200
remappings = [
  "@openzeppelin/=lib/openzeppelin-contracts/",
  "forge-std/=lib/forge-std/src/",
]

# Robinhood Chain — chainId 4663 mainnet, 46630 testnet
[rpc_endpoints]
rh_mainnet = "https://rpc.mainnet.chain.robinhood.com"
rh_testnet = "https://rpc.testnet.chain.robinhood.com/rpc"
