[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc = "0.8.28"
optimizer = true
optimizer_runs = 200
remappings = [
  "@openzeppelin/=lib/openzeppelin-contracts/",
  "forge-std/=lib/forge-std/src/",
]

# Robinhood Chain — chainId 4663 mainnet, 46630 testnet
# Deploy.s.sol has too many locals for the legacy pipeline, but via_ir changes gas behaviour
# enough to break the loop-heavy liveness tests. Keep it to the script profile:
#   FOUNDRY_PROFILE=script forge script script/Deploy.s.sol …
[profile.script]
via_ir = true

[rpc_endpoints]
rh_mainnet = "https://rpc.mainnet.chain.robinhood.com"
rh_testnet = "https://rpc.testnet.chain.robinhood.com/rpc"
